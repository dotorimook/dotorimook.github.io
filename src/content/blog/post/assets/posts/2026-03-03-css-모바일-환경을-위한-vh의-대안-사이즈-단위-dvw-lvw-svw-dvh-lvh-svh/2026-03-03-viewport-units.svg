<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="#f8f9fa" rx="10"/>
  
  <!-- Device Frame -->
  <rect x="100" y="20" width="200" height="400" rx="20" fill="#333" stroke="#000" stroke-width="4"/>
  <rect x="110" y="40" width="180" height="360" rx="5" fill="#fff"/>
  
  <!-- Browser UI (Top Bar) -->
  <rect x="110" y="40" width="180" height="30" fill="#e0e0e0"/>
  <circle cx="125" cy="55" r="3" fill="#999"/>
  <rect x="135" y="52" width="140" height="6" rx="3" fill="#bbb"/>

  <!-- Browser UI (Bottom Toolbar - for SVH) -->
  <rect x="110" y="360" width="180" height="40" fill="#e0e0e0" opacity="0.8"/>
  <path d="M140 380 l10 -10 l10 10" fill="none" stroke="#666" stroke-width="2"/>
  <path d="M240 380 l10 10 l10 -10" fill="none" stroke="#666" stroke-width="2"/>

  <!-- Visualizing Units -->
  <!-- LVH (Full height without dynamic UI) -->
  <line x1="310" y1="40" x2="310" y2="400" stroke="#ff4757" stroke-width="2" stroke-dasharray="4"/>
  <text x="320" y="220" font-family="sans-serif" font-size="12" fill="#ff4757" font-weight="bold">100lvh</text>
  <path d="M305 40 h10 M305 400 h10" fill="none" stroke="#ff4757" stroke-width="2"/>

  <!-- SVH (Height with address bar/toolbar) -->
  <line x1="70" y1="40" x2="70" y2="360" stroke="#2ed573" stroke-width="2" stroke-dasharray="4"/>
  <text x="30" y="200" font-family="sans-serif" font-size="12" fill="#2ed573" font-weight="bold">100svh</text>
  <path d="M65 40 h10 M65 360 h10" fill="none" stroke="#2ed573" stroke-width="2"/>

  <!-- DVH (Indicator) -->
  <rect x="120" y="70" width="160" height="290" fill="#1e90ff" opacity="0.1"/>
  <text x="200" y="220" font-family="sans-serif" font-size="14" fill="#1e90ff" font-weight="bold" text-anchor="middle">100dvh</text>
  <text x="200" y="240" font-family="sans-serif" font-size="10" fill="#1e90ff" text-anchor="middle">(Changes as UI scrolls)</text>

  <!-- Labels -->
  <text x="200" y="440" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold" text-anchor="middle">Viewport Units Comparison</text>
  <text x="200" y="460" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">svh vs lvh vs dvh</text>
</svg>
